<title>Inventario de Medicamentos — IMSS BIENESTAR</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700&family=Source+Sans+3:wght@300;400;500;600&display=swap');

:root {
  --verde: #006847;
  --verde-claro: #008f5d;
  --verde-suave: #e8f4ef;
  --rojo: #c0392b;
  --dorado: #c8973a;
  --blanco: #f9faf8;
  --gris-claro: #eef0ed;
  --gris-medio: #9aaa96;
  --gris-texto: #3a3f35;
  --borde: #cad5c5;
  --sombra: 0 2px 16px rgba(0,100,60,0.09);
  --amarillo: #f3c23a;
  --amarillo-suave: #fdf4d9;
  --rojo-suave: #fde4e1;
  --negro-sem: #1c1c1c;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: #f0f4f0;
  color: var(--gris-texto);
  min-height: 100vh;
  padding: 0 0 60px 0;
}

h1,h2,h3 { font-family: 'Lora', serif; font-weight: 600; }

.header-banner {
  background: linear-gradient(135deg, #004d35 0%, #006847 50%, #008f5d 100%);
  color: white;
  padding: 28px 24px 26px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header-banner h1 { font-size: 1.6rem; letter-spacing: 0.3px; }
.header-banner .sub { opacity: 0.88; margin-top: 6px; font-size: 0.95rem; }
.header-banner::before,
.header-banner::after {
  content: ''; position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.header-banner::before { top: -40px; right: -40px; width: 200px; height: 200px; }
.header-banner::after { bottom: -60px; left: -30px; width: 160px; height: 160px; }
.header-back {
  position: absolute; top: 16px; left: 16px;
  color: #fff; text-decoration: none; background: rgba(255,255,255,0.12);
  padding: 6px 12px; border-radius: 20px; font-size: 0.85rem;
  border: 1px solid rgba(255,255,255,0.25);
}

.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px 0; }

.pill-bar {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 10px 4px 16px; margin-bottom: 10px;
  scrollbar-width: thin;
}
.pill {
  flex: 0 0 auto; cursor: pointer;
  padding: 10px 16px; border-radius: 999px;
  background: rgba(0,104,71,0.08); color: var(--verde);
  font-weight: 500; border: 1px solid transparent;
  white-space: nowrap; font-size: 0.95rem;
  transition: all 0.2s;
}
.pill:hover { background: rgba(0,104,71,0.14); }
.pill.active {
  background: #fff; color: var(--verde);
  border-color: var(--verde); box-shadow: var(--sombra);
}
.pill .ico { margin-right: 6px; }

.section-card {
  background: #fff; border-radius: 12px;
  padding: 22px; margin-bottom: 16px;
  box-shadow: var(--sombra);
  border: 1px solid var(--borde);
  border-top: 3px solid var(--verde);
  animation: fadeUp 0.35s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.section-card h2 { color: var(--verde); font-size: 1.2rem; margin-bottom: 14px; }
.section-card h3 { color: var(--verde); font-size: 1rem; margin: 14px 0 8px; }
.iTab { display: none; }
.iTab.active { display: block; }

.fields-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
}
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group label {
  font-size: 0.85rem; font-weight: 500; color: var(--verde);
}
.field-group input,
.field-group select,
.field-group textarea {
  padding: 9px 12px; border: 1px solid var(--borde);
  border-radius: 8px; background: #fff; font-size: 0.95rem;
  font-family: inherit; color: var(--gris-texto);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field-group input:focus,
.field-group select:focus,
.field-group textarea:focus {
  outline: none; border-color: var(--verde);
  box-shadow: 0 0 0 3px rgba(0,104,71,0.15);
}
.field-hint { font-size: 0.78rem; color: var(--gris-medio); }
.field-group.full { grid-column: 1 / -1; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; cursor: pointer;
  padding: 10px 18px; border-radius: 8px;
  font-size: 0.95rem; font-weight: 500;
  border: none; font-family: inherit;
  transition: all 0.15s;
}
.btn-primary { background: var(--verde); color: #fff; }
.btn-primary:hover { background: var(--verde-claro); }
.btn-secondary { background: var(--gris-claro); color: var(--gris-texto); border: 1px solid var(--borde); }
.btn-secondary:hover { background: #e0e5de; }
.btn-danger { background: var(--rojo); color: #fff; }
.btn-danger:hover { background: #a63022; }
.btn-ghost { background: transparent; color: var(--verde); border: 1px solid var(--verde); }
.btn-ghost:hover { background: var(--verde-suave); }
.btn-sm { padding: 6px 10px; font-size: 0.85rem; }

.toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 14px; }

table {
  width: 100%; border-collapse: collapse;
  font-size: 0.9rem; background: #fff;
}
th, td {
  padding: 8px 10px; text-align: left;
  border-bottom: 1px solid var(--gris-claro);
  vertical-align: middle;
}
th {
  background: var(--verde-suave); color: var(--verde);
  font-weight: 600; position: sticky; top: 0; z-index: 1;
  font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.3px;
}
tr:hover td { background: #fafdfa; }
.table-wrap {
  overflow: auto; max-height: 65vh;
  border: 1px solid var(--borde); border-radius: 8px;
}

.sem {
  display: inline-block; padding: 3px 10px;
  border-radius: 999px; font-size: 0.82rem;
  font-weight: 600; min-width: 64px; text-align: center;
}
.sem-verde { background: var(--verde-suave); color: var(--verde); }
.sem-amarillo { background: var(--amarillo-suave); color: #7a5a0a; }
.sem-rojo { background: var(--rojo-suave); color: var(--rojo); }
.sem-negro { background: var(--negro-sem); color: #fff; }
.sem-aviso {
  display: inline-block; margin-left: 6px;
  padding: 2px 8px; border-radius: 4px;
  background: #ffe8d1; color: #9a4600;
  font-size: 0.72rem; font-weight: 600;
}

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--verde); color: #fff;
  padding: 12px 22px; border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  font-size: 0.95rem; z-index: 9999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
.toast.error { background: var(--rojo); }
.toast.warn { background: var(--dorado); }

.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(3px);
  display: none; align-items: center; justify-content: center;
  z-index: 9000; padding: 16px;
}
.overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 14px;
  padding: 22px; max-width: 520px; width: 100%;
  max-height: 92vh; overflow: auto;
  box-shadow: 0 12px 48px rgba(0,0,0,0.28);
}
.modal h3 { color: var(--verde); margin-bottom: 10px; }
.modal .actions {
  display: flex; gap: 8px; justify-content: flex-end;
  margin-top: 18px; flex-wrap: wrap;
}
#qr-reader { width: 100%; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.kpi {
  background: #fff; border: 1px solid var(--borde);
  border-radius: 10px; padding: 12px 14px;
}
.kpi .label { font-size: 0.78rem; color: var(--gris-medio); text-transform: uppercase; }
.kpi .value { font-size: 1.45rem; color: var(--verde); font-weight: 600; margin-top: 2px; }

.filter-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin: 8px 0 14px; align-items: end;
}
.filter-bar .field-group { min-width: 150px; }

.badge {
  background: var(--verde-suave); color: var(--verde);
  padding: 2px 8px; border-radius: 6px; font-size: 0.8rem;
}
.badge-red { background: var(--rojo-suave); color: var(--rojo); }

.row-caducado td { background: #2a2a2a !important; color: #fff; }
.row-caducado td a, .row-caducado td .sem { color: #fff; }

@media (max-width: 640px) {
  .header-banner h1 { font-size: 1.3rem; }
  .section-card { padding: 16px; }
  th, td { padding: 6px 8px; font-size: 0.82rem; }
}
</style>

// ---------- utilidades ----------
const LS = {
  CAT: 'inv_catalogo',
  LOT: 'inv_lotes',
  MOV: 'inv_movimientos',
  CFG: 'inv_config',
};
const CFG_DEFAULT = {
  umbralVerdeMeses: 12,
  umbralAmarilloMeses: 6,
  umbralAvisoMeses: 3,
  equipo: '',
  usuarioDefault: ''
};

function uid() {
  if (crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}

function loadLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    console.warn('loadLS error', key, e);
    return fallback;
  }
}
function saveLS(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

function rowToCatItem(r) {
  return {
    clave: r[0],
    grupo: r[1],
    nombreGenerico: r[2],
    presentacion: r[3],
    concentracion: r[4],
    unidadesPorEmpaque: Number(r[5]) || 1,
    descripcion: r[6],
    pesoUnitario_g: Number(r[7]) || 0,
    pesoEmpaque_g: Number(r[8]) || 0,
    codigoBarras: ''
  };
}

// ---------- state ----------
let CAT = loadLS(LS.CAT, null);
if (!CAT || !CAT.length) {
  CAT = CATALOGO_SEED_ROWS.map(rowToCatItem);
  saveLS(LS.CAT, CAT);
}
let LOT = loadLS(LS.LOT, []);
let MOV = loadLS(LS.MOV, []);
let CFG = Object.assign({}, CFG_DEFAULT, loadLS(LS.CFG, {}));

function persistAll() {
  saveLS(LS.CAT, CAT);
  saveLS(LS.LOT, LOT);
  saveLS(LS.MOV, MOV);
  saveLS(LS.CFG, CFG);
}

// ---------- lookups ----------
function findCatByClave(clave) {
  if (!clave) return null;
  const c = String(clave).trim();
  return CAT.find(x => x.clave === c) || null;
}
function findCatByCodigoBarras(code) {
  if (!code) return null;
  const c = String(code).trim();
  return CAT.find(x => x.codigoBarras && x.codigoBarras === c) || null;
}
function findCatByScan(text) {
  return findCatByCodigoBarras(text) || findCatByClave(text);
}
function lotesDeClave(clave) {
  return LOT.filter(l => l.clave === clave).sort((a, b) => (a.caducidad || '').localeCompare(b.caducidad || ''));
}
function stockDeClave(clave) {
  return lotesDeClave(clave).reduce((s, l) => s + (Number(l.cantidad) || 0), 0);
}

// ---------- semáforo ----------
function diasRestantes(caducidadISO) {
  if (!caducidadISO) return null;
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  const d = new Date(caducidadISO + 'T00:00:00');
  return Math.round((d - hoy) / 86400000);
}
function mesesRestantes(caducidadISO) {
  const d = diasRestantes(caducidadISO);
  if (d == null) return null;
  return d / 30.4375;
}
function semaforoDe(caducidadISO) {
  const m = mesesRestantes(caducidadISO);
  if (m == null) return { key: 'verde', label: 'Sin fecha', aviso: false };
  if (m < 0) return { key: 'negro', label: 'Caducado', aviso: false };
  if (m >= CFG.umbralVerdeMeses) return { key: 'verde', label: 'Verde', aviso: false };
  if (m >= CFG.umbralAmarilloMeses) return { key: 'amarillo', label: 'Amarillo', aviso: false };
  return { key: 'rojo', label: 'Rojo', aviso: m <= CFG.umbralAvisoMeses };
}

// ---------- pesos ----------
function pesoLote(lote, cat) {
  if (!cat) return 0;
  const u = Number(cat.unidadesPorEmpaque) || 1;
  const pu = Number(cat.pesoUnitario_g) || 0;
  const pe = Number(cat.pesoEmpaque_g) || 0;
  const c = Number(lote.cantidad) || 0;
  return c * pu + Math.ceil(c / u) * pe;
}
function gramosLegibles(g) {
  if (g == null || isNaN(g)) return '—';
  if (g >= 1000) return (g / 1000).toFixed(2) + ' kg';
  return g.toFixed(1) + ' g';
}

// ---------- mutaciones ----------
function registrarEntrada({ clave, lote, caducidad, cantidad, nota, origen }) {
  const cat = findCatByClave(clave);
  if (!cat) throw new Error('Clave no encontrada en el catálogo: ' + clave);
  cantidad = Number(cantidad);
  if (!cantidad || cantidad <= 0) throw new Error('La cantidad debe ser mayor a 0.');
  let existente = LOT.find(l => l.clave === clave && l.lote === lote && l.caducidad === caducidad);
  if (existente) {
    existente.cantidad += cantidad;
  } else {
    LOT.push({ id: uid(), clave, lote: lote || '-', caducidad: caducidad || '', cantidad });
  }
  MOV.push({
    id: uid(),
    tipo: 'entrada',
    clave, lote: lote || '-', caducidad: caducidad || '',
    cantidad,
    fecha: new Date().toISOString(),
    origen: origen || 'manual',
    usuario: CFG.usuarioDefault || '',
    nota: nota || ''
  });
  persistAll();
}

function registrarSalida({ clave, loteId, cantidad, nota, origen }) {
  const cat = findCatByClave(clave);
  if (!cat) throw new Error('Clave no encontrada en el catálogo: ' + clave);
  cantidad = Number(cantidad);
  if (!cantidad || cantidad <= 0) throw new Error('La cantidad debe ser mayor a 0.');
  const lote = LOT.find(l => l.id === loteId);
  if (!lote) throw new Error('Lote no encontrado.');
  if (cantidad > lote.cantidad) throw new Error('Stock insuficiente en el lote (disponible: ' + lote.cantidad + ').');
  lote.cantidad -= cantidad;
  MOV.push({
    id: uid(),
    tipo: 'salida',
    clave, lote: lote.lote, caducidad: lote.caducidad,
    cantidad,
    fecha: new Date().toISOString(),
    origen: origen || 'manual',
    usuario: CFG.usuarioDefault || '',
    nota: nota || ''
  });
  if (lote.cantidad === 0) {
    LOT = LOT.filter(l => l.id !== lote.id);
  }
  persistAll();
}

function fmtFechaHora(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('es-MX', { dateStyle: 'short', timeStyle: 'short' });
  } catch (e) { return iso; }
}
function fmtFecha(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('es-MX', { day: '2-digit', month: '2-digit', year: 'numeric' });
  } catch (e) { return iso; }
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.className = 'toast', 3200);
}

// ---------- helpers DOM ----------
function h(tag, props, ...children) {
  const el = document.createElement(tag);
  if (props) {
    for (const k in props) {
      if (k === 'class') el.className = props[k];
      else if (k === 'html') el.innerHTML = props[k];
      else if (k.startsWith('on') && typeof props[k] === 'function') el.addEventListener(k.slice(2), props[k]);
      else if (k === 'style' && typeof props[k] === 'object') Object.assign(el.style, props[k]);
      else el.setAttribute(k, props[k]);
    }
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}
function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

function datalistCatalogo() {
  let dl = document.getElementById('dl-catalogo');
  if (!dl) {
    dl = document.createElement('datalist');
    dl.id = 'dl-catalogo';
    document.body.appendChild(dl);
  }
  dl.innerHTML = CAT.map(c =>
    `<option value="${c.clave}">${c.nombreGenerico} ${c.concentracion} ${c.presentacion}</option>`
  ).join('');
  return dl;
}

function gruposDisponibles() {
  return Array.from(new Set(CAT.map(c => c.grupo).filter(Boolean))).sort();
}

function campo(id, label, attrs) {
  const inp = h('input', Object.assign({ id }, attrs || {}));
  return h('div', { class: 'field-group' }, h('label', { for: id }, label), inp);
}
function campoDisplay(id, label) {
  return h('div', { class: 'field-group full' },
    h('label', { for: id }, label),
    h('div', { id, class: 'field-hint', style: 'padding:9px 12px;background:var(--verde-suave);border-radius:8px;min-height:38px' }, 'Selecciona una clave…')
  );
}

function actualizarDescEntrada() {
  const clave = document.getElementById('ent-clave').value.trim();
  const cat = findCatByClave(clave);
  const d = document.getElementById('ent-desc');
  d.textContent = cat ? cat.descripcion : 'Clave no encontrada en el catálogo.';
  d.style.color = cat ? '' : 'var(--rojo)';
}

function submitEntrada() {
  try {
    registrarEntrada({
      clave: document.getElementById('ent-clave').value.trim(),
      lote: document.getElementById('ent-lote').value.trim(),
      caducidad: document.getElementById('ent-cad').value,
      cantidad: document.getElementById('ent-cant').value,
      nota: document.getElementById('ent-nota').value.trim(),
      origen: 'manual'
    });
    toast('Entrada registrada.');
    limpiarEntrada();
  } catch (e) { toast(e.message, 'error'); }
}
function limpiarEntrada() {
  ['ent-clave', 'ent-lote', 'ent-cad', 'ent-cant', 'ent-nota', 'ent-scan-fisico'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  const d = document.getElementById('ent-desc');
  if (d) { d.textContent = 'Selecciona una clave…'; d.style.color = ''; }
}
function onScanFisicoEntrada(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = e.target.value.trim();
  const cat = findCatByScan(val);
  if (cat) {
    document.getElementById('ent-clave').value = cat.clave;
    actualizarDescEntrada();
    toast('Lectura: ' + cat.clave);
  } else {
    document.getElementById('ent-clave').value = val;
    actualizarDescEntrada();
    toast('Código no encontrado; se copió al campo clave.', 'warn');
  }
  e.target.value = '';
}

function refrescarLotesSalida() {
  const clave = document.getElementById('sal-clave').value.trim();
  const cat = findCatByClave(clave);
  const d = document.getElementById('sal-desc');
  d.textContent = cat ? cat.descripcion : 'Clave no encontrada en el catálogo.';
  d.style.color = cat ? '' : 'var(--rojo)';
  const sel = document.getElementById('sal-lote');
  clear(sel);
  if (!cat) { sel.appendChild(h('option', { value: '' }, 'Selecciona clave válida…')); return; }
  const lotes = lotesDeClave(clave);
  if (!lotes.length) { sel.appendChild(h('option', { value: '' }, 'Sin stock para esta clave')); return; }
  sel.appendChild(h('option', { value: '' }, 'Selecciona lote…'));
  lotes.forEach(l => {
    const s = semaforoDe(l.caducidad);
    const txt = `Lote ${l.lote} · Cad ${fmtFecha(l.caducidad) || 's/f'} · ${l.cantidad} pz · ${s.label}`;
    sel.appendChild(h('option', { value: l.id }, txt));
  });
}
function submitSalida() {
  try {
    registrarSalida({
      clave: document.getElementById('sal-clave').value.trim(),
      loteId: document.getElementById('sal-lote').value,
      cantidad: document.getElementById('sal-cant').value,
      nota: document.getElementById('sal-nota').value.trim(),
      origen: 'manual'
    });
    toast('Salida registrada.');
    limpiarSalida();
  } catch (e) { toast(e.message, 'error'); }
}
function limpiarSalida() {
  ['sal-clave', 'sal-cant', 'sal-nota', 'sal-scan-fisico'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.getElementById('sal-lote').innerHTML = '<option value="">Selecciona clave primero…</option>';
  const d = document.getElementById('sal-desc');
  if (d) { d.textContent = 'Selecciona una clave…'; d.style.color = ''; }
}
function onScanFisicoSalida(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const val = e.target.value.trim();
  const cat = findCatByScan(val);
  if (cat) {
    document.getElementById('sal-clave').value = cat.clave;
    refrescarLotesSalida();
    toast('Lectura: ' + cat.clave);
  } else {
    document.getElementById('sal-clave').value = val;
    refrescarLotesSalida();
    toast('Código no encontrado; se copió al campo clave.', 'warn');
  }
  e.target.value = '';
}

function renderStock() {

    ...gruposDisponibles().map(g => h('option', { value: g, selected: (window._stFiltro && window._stFiltro.grupo === g) ? 'selected' : null }, g)));
  const filtroColor = h('select', { id: 'st-color', onchange: renderStock },

  // aplicar valores actuales
  setTimeout(() => {
    if (window._stFiltro.grupo != null) filtroGrupo.value = window._stFiltro.grupo;
    if (window._stFiltro.color != null) filtroColor.value = window._stFiltro.color;
    if (window._stFiltro.q != null) filtroTxt.value = window._stFiltro.q;
  }, 0);

  const tb = h('tbody');
  const tabla = h('table',
    null,
    h('thead', null,
      h('tr', null,
        ['Clave', 'Descripción', 'Grupo', 'Lote', 'Caducidad', 'Días', 'Semáforo', 'Cantidad', 'Peso unit. (g)', 'Peso total'].map(t => h('th', null, t))
      )
    ),
    tb
  );

  const q = (filtroTxt.value || '').toLowerCase();
  const grupoSel = filtroGrupo.value;
  const colorSel = filtroColor.value;

  let totalPiezas = 0, totalPeso = 0, filas = 0;
  const rows = LOT.map(l => {
    const cat = findCatByClave(l.clave);
    const sem = semaforoDe(l.caducidad);
    const peso = pesoLote(l, cat);

  }).filter(({ l, cat, sem }) => {
    if (grupoSel && (!cat || cat.grupo !== grupoSel)) return false;

    if (q) {
      const t = (l.clave + ' ' + (cat ? cat.descripcion : '') + ' ' + l.lote).toLowerCase();
      if (!t.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => (a.l.caducidad || '').localeCompare(b.l.caducidad || ''));

  rows.forEach(({ l, cat, sem, peso }) => {
    filas++;

      h('td', null, String(l.cantidad)),
      h('td', null, cat ? cat.pesoUnitario_g.toFixed(2) : '—'),
      h('td', null, gramosLegibles(peso))
    );
    tb.appendChild(tr);
  });

  const kpis = h('div', { class: 'kpi-grid' },
    kpi('Lotes visibles', String(filas)),
    kpi('Piezas totales', totalPiezas.toLocaleString('es-MX')),
    kpi('Peso total', gramosLegibles(totalPeso)),
    kpi('Claves distintas', String(new Set(rows.map(r => r.l.clave)).size))
  );

  const card = h('div', { class: 'section-card' },
    h('h2', null, 'Stock actual por lote'),
    h('div', { class: 'filter-bar' },
      h('div', { class: 'field-group' }, h('label', null, 'Grupo'), filtroGrupo),
      h('div', { class: 'field-group' }, h('label', null, 'Color'), filtroColor),
      h('div', { class: 'field-group', style: 'flex:1;min-width:220px' }, h('label', null, 'Buscar'), filtroTxt),
    ),
    kpis,
    h('div', { class: 'table-wrap' }, tabla)
  );
  host.appendChild(card);
}

function editarCatalogo(clave) {
  const c = clave ? findCatByClave(clave) : { clave: '', grupo: '', nombreGenerico: '', presentacion: '', concentracion: '', unidadesPorEmpaque: 1, descripcion: '', pesoUnitario_g: 0, pesoEmpaque_g: 0, codigoBarras: '' };
  if (clave && !c) { toast('Clave no encontrada', 'error'); return; }
  const form = h('div', { class: 'fields-grid' },
    campoPreset('ec-clave', 'Clave', c.clave, !!clave),
    campoPreset('ec-gen', 'Nombre genérico', c.nombreGenerico),
    campoPreset('ec-pres', 'Presentación', c.presentacion),
    campoPreset('ec-conc', 'Concentración', c.concentracion),
    campoPreset('ec-grp', 'Grupo terapéutico', c.grupo),
    campoPreset('ec-upe', 'Unidades por empaque', c.unidadesPorEmpaque, false, 'number'),
    campoPreset('ec-pu', 'Peso unitario (g)', c.pesoUnitario_g, false, 'number'),
    campoPreset('ec-pe', 'Peso empaque (g)', c.pesoEmpaque_g, false, 'number'),
    campoPreset('ec-cb', 'Código de barras', c.codigoBarras),
    h('div', { class: 'field-group full' },
      h('label', null, 'Descripción oficial'),
      h('textarea', { id: 'ec-desc', rows: 2, style: 'padding:9px 12px;border:1px solid var(--borde);border-radius:8px' }, c.descripcion)
    )
  );
  abrirModal((clave ? 'Editar clave ' + clave : 'Nueva clave'), form, () => {
    const nuevo = {
      clave: document.getElementById('ec-clave').value.trim(),
      nombreGenerico: document.getElementById('ec-gen').value.trim(),
      presentacion: document.getElementById('ec-pres').value.trim(),
      concentracion: document.getElementById('ec-conc').value.trim(),
      grupo: document.getElementById('ec-grp').value.trim(),
      unidadesPorEmpaque: Number(document.getElementById('ec-upe').value) || 1,
      pesoUnitario_g: Number(document.getElementById('ec-pu').value) || 0,
      pesoEmpaque_g: Number(document.getElementById('ec-pe').value) || 0,
      codigoBarras: document.getElementById('ec-cb').value.trim(),
      descripcion: document.getElementById('ec-desc').value.trim()
    };
    if (!nuevo.clave) { toast('La clave es obligatoria', 'error'); return false; }
    const idx = CAT.findIndex(x => x.clave === nuevo.clave);
    if (idx >= 0) CAT[idx] = Object.assign(CAT[idx], nuevo);
    else CAT.push(nuevo);
    persistAll();
    renderCatalogo();
    toast(clave ? 'Clave actualizada' : 'Clave agregada');
    return true;
  });
}
function campoPreset(id, label, val, readonly, type) {
  const attrs = { id };
  if (readonly) attrs.readonly = 'readonly';
  if (type) attrs.type = type;
  attrs.value = val == null ? '' : val;
  return h('div', { class: 'field-group' }, h('label', { for: id }, label), h('input', attrs));
}
function eliminarCatalogo(clave) {
  if (!confirm('¿Eliminar la clave ' + clave + ' del catálogo? Los lotes y movimientos existentes no se borran.')) return;
  CAT = CAT.filter(c => c.clave !== clave);
  persistAll();
  renderCatalogo();
  toast('Clave eliminada');
}

// ---------- Tabs ----------
function switchTab(tab) {
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.tab === tab));
  document.querySelectorAll('.iTab').forEach(s => s.classList.toggle('active', s.id === 'tab-' + tab));
  if (tab === 'entrada') renderEntrada();
  else if (tab === 'salida') renderSalida();
  else if (tab === 'stock') renderStock();
  else if (tab === 'historial') renderHistorial();
  else if (tab === 'catalogo') renderCatalogo();
  else if (tab === 'backup') renderBackup();
  else if (tab === 'ajustes') renderAjustes();
}
function renderAll() {
  document.querySelectorAll('.iTab').forEach(s => clear(s));
  const active = document.querySelector('.pill.active');
  switchTab(active ? active.dataset.tab : 'entrada');
}

// ---------- descarga y lectura de archivos ----------
function descargar(nombre, blob) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nombre;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
}
function pickFile(accept) {
  return new Promise(resolve => {
    const i = document.createElement('input');
    i.type = 'file';
    i.accept = accept;
    i.onchange = () => resolve(i.files && i.files[0]);
    i.click();
  });
}
function leerArchivoComoBuffer(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(r.error);
    r.readAsArrayBuffer(f);
  });
}
function leerArchivoComoTexto(f) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(r.error);
    r.readAsText(f);
  });
}

      presentacion: String(r['Presentación'] || r.presentacion || '').trim(),
      unidadesPorEmpaque: Number(r['Unidades por empaque'] || r.unidadesPorEmpaque || 1) || 1,
      grupo: String(r.Grupo || r.grupo || '').trim(),
      pesoUnitario_g: Number(r['Peso unitario (g)'] || r.pesoUnitario_g || 0) || 0,
      pesoEmpaque_g: Number(r['Peso empaque (g)'] || r.pesoEmpaque_g || 0) || 0,
      codigoBarras: String(r['Código de barras'] || r.codigoBarras || '').trim(),
      descripcion: String(r['Descripción'] || r.descripcion || '').trim()
    })).filter(x => x.clave);
    mezclarCatalogo(mapped);
    toast('Catálogo importado (' + mapped.length + ' filas).');
    renderCatalogo();
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}
function mezclarCatalogo(arr) {
  arr.forEach(n => {
    const idx = CAT.findIndex(x => x.clave === n.clave);
    if (idx >= 0) CAT[idx] = Object.assign(CAT[idx], n);
    else CAT.push(n);
  });
  persistAll();
}

async function importarPaqueteJSON(modo) {
  const f = await pickFile('.json,application/json');

async function importarPaqueteXLSX(modo) {
  const f = await pickFile('.xlsx,.xls');
  if (!f) return;
  try {
    const buf = await leerArchivoComoBuffer(f);
    const wb = XLSX.read(buf, { type: 'array' });
    const sheetAs = (re) => {
      const name = wb.SheetNames.find(n => re.test(n));
      return name ? XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: '' }) : [];
    };
    const catRows = sheetAs(/cat/i).map(r => ({
      clave: String(r.Clave || r.clave || '').trim(),
      nombreGenerico: String(r['Nombre genérico'] || '').trim(),
      concentracion: String(r['Concentración'] || '').trim(),
      presentacion: String(r['Presentación'] || '').trim(),
      unidadesPorEmpaque: Number(r['Unidades por empaque'] || 1) || 1,
      grupo: String(r.Grupo || '').trim(),
      pesoUnitario_g: Number(r['Peso unitario (g)'] || 0) || 0,
      pesoEmpaque_g: Number(r['Peso empaque (g)'] || 0) || 0,
      codigoBarras: String(r['Código de barras'] || '').trim(),
      descripcion: String(r['Descripción'] || '').trim()
    })).filter(x => x.clave);
    const lotRows = sheetAs(/lote/i).map(r => ({
      id: String(r.id || uid()),
      clave: String(r.Clave || '').trim(),
      lote: String(r.Lote || '').trim(),
      caducidad: typeof r.Caducidad === 'number' ? excelFechaISO(r.Caducidad) : String(r.Caducidad || '').slice(0, 10),
      cantidad: Number(r.Cantidad) || 0
    })).filter(x => x.clave && x.cantidad > 0);
    const movRows = sheetAs(/movim/i).map(r => ({
      id: String(r.id || uid()),
      fecha: String(r.Fecha || new Date().toISOString()),
      tipo: String(r.Tipo || 'entrada'),
      clave: String(r.Clave || '').trim(),
      lote: String(r.Lote || ''),
      caducidad: typeof r.Caducidad === 'number' ? excelFechaISO(r.Caducidad) : String(r.Caducidad || '').slice(0, 10),
      cantidad: Number(r.Cantidad) || 0,
      origen: String(r.Origen || 'manual'),
      usuario: String(r.Usuario || ''),
      nota: String(r.Nota || '')
    })).filter(x => x.clave);
    const cfgRows = sheetAs(/config/i);
    const cfg = cfgRows[0] || {};
    aplicarPaquete({
      catalogo: catRows, lotes: lotRows, movimientos: movRows,
      config: {
        umbralVerdeMeses: Number(cfg.umbralVerdeMeses) || CFG.umbralVerdeMeses,
        umbralAmarilloMeses: Number(cfg.umbralAmarilloMeses) || CFG.umbralAmarilloMeses,
        umbralAvisoMeses: Number(cfg.umbralAvisoMeses) || CFG.umbralAvisoMeses,
        equipo: String(cfg.equipo || CFG.equipo),
        usuarioDefault: String(cfg.usuarioDefault || CFG.usuarioDefault)
      }
    }, modo);
    toast('Paquete Excel importado (' + modo + ').');
    renderAll();
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}
function excelFechaISO(serial) {
  // SheetJS devuelve número de serie de Excel si no hay cellDates
  const d = new Date(Math.round((serial - 25569) * 86400 * 1000));
  return isNaN(d) ? '' : d.toISOString().slice(0, 10);
}
function aplicarPaquete(pkg, modo) {
  if (!pkg || typeof pkg !== 'object') throw new Error('Paquete inválido.');
  if (modo === 'reemplazar') {
    CAT = Array.isArray(pkg.catalogo) ? pkg.catalogo : [];
    LOT = Array.isArray(pkg.lotes) ? pkg.lotes : [];
    MOV = Array.isArray(pkg.movimientos) ? pkg.movimientos : [];
    if (pkg.config) CFG = Object.assign({}, CFG_DEFAULT, pkg.config);
  } else {
    if (Array.isArray(pkg.catalogo)) mezclarCatalogo(pkg.catalogo);
    if (Array.isArray(pkg.lotes)) pkg.lotes.forEach(l => {
      const i = LOT.findIndex(x => x.id === l.id);
      if (i >= 0) LOT[i] = l; else LOT.push(l);
    });
    if (Array.isArray(pkg.movimientos)) pkg.movimientos.forEach(m => {
      if (!MOV.some(x => x.id === m.id)) MOV.push(m);
    });
    if (pkg.config) CFG = Object.assign({}, CFG, pkg.config);
  }
  persistAll();
}

// ---------- Escáner cámara ----------
let _qrInstance = null;
let _scanTarget = null;
function abrirCamara(target) {
  _scanTarget = target;
  document.getElementById('overlay-camera').classList.add('show');
  setTimeout(async () => {
    try {
      _qrInstance = new Html5Qrcode('qr-reader');
      await _qrInstance.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 260, height: 140 } },
        onScanDetected,
        () => {}
      );
    } catch (e) { toast('No se pudo iniciar la cámara: ' + e, 'error'); cerrarCamara(); }
  }, 50);
}
function onScanDetected(decoded) {
  const cat = findCatByScan(decoded);
  if (_scanTarget === 'entrada') {
    document.getElementById('ent-clave').value = cat ? cat.clave : decoded;
    actualizarDescEntrada();
  } else if (_scanTarget === 'salida') {
    document.getElementById('sal-clave').value = cat ? cat.clave : decoded;
    refrescarLotesSalida();
  }
  toast(cat ? ('Lectura: ' + cat.clave) : ('Código: ' + decoded + ' (sin match)'));
  cerrarCamara();
}
function cerrarCamara() {
  document.getElementById('overlay-camera').classList.remove('show');
  if (_qrInstance) {
    _qrInstance.stop().then(() => _qrInstance.clear()).catch(() => {});
    _qrInstance = null;
  }
}
// ---------- Bootstrap ----------
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  document.getElementById('btn-camera-close').addEventListener('click', cerrarCamara);
  document.getElementById('overlay-generic').addEventListener('click', (e) => {

  });
  // Cerrar modal cámara si clic fuera
  document.getElementById('overlay-camera').addEventListener('click', (e) => {
    if (e.target.id === 'overlay-camera') cerrarCamara();
  });
  datalistCatalogo();
  switchTab('entrada');
});
